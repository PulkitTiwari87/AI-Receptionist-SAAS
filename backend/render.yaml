services:
  - type: web
    name: ai-receptionist-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false        # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false        # Set manually in Render dashboard
      - key: FRONTEND_URL
        sync: false        # Set manually after Vercel deployment
      - key: PORT
        value: 5000
      - key: RETELL_API_KEY
        sync: false        # Set manually in Render dashboard
    healthCheckPath: /api/health
